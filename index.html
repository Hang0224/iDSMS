<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDSMS Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1e293b; color: white; margin: 0; overflow: hidden; }
        .sidebar { background-color: #0f172a; width: 260px; height: 100vh; display: flex; flex-direction: column; padding: 50px 30px; flex-shrink: 0; }
        .nav-item { padding: 12px 0; cursor: pointer; transition: 0.2s; color: white; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; }
        .nav-item:hover { opacity: 0.7; }
        .nav-item.active { color: white; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 50px; background-color: #1e293b; }
        .glass { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; }
        input { background: transparent !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white; border-radius: 8px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* 禁用按钮的样式 */
        button:disabled { opacity: 0.25; cursor: not-allowed; }
    </style>
</head>
<body class="flex">

    <!-- 登录模块 -->
    <div id="auth-section" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a]">
        <div class="w-full max-w-md p-10">
            <h1 class="text-6xl font-extrabold mb-12 tracking-tighter text-center">iDSMS</h1>
            <div class="space-y-5">
                <input type="email" id="email" placeholder="Email" class="w-full p-4">
                <input type="password" id="password" placeholder="Password" class="w-full p-4">
                <button onclick="handleLogin()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">Sign In</button>
            </div>
        </div>
    </div>

    <!-- 侧边栏 Sidebar -->
    <div class="sidebar">
        <h1 class="text-5xl font-extrabold mb-16 tracking-tighter">iDSMS</h1>
        <nav class="flex-1 space-y-2">
            <div class="nav-item active" onclick="showPage('dashboard', this)">• Dashboard</div>
            <div class="nav-item" onclick="showPage('activity', this)">• Activity log</div>
            <div class="nav-item" onclick="showPage('notification', this)">• Notification</div>
            <div id="nav-register" class="nav-item hidden" onclick="showPage('register', this)">• User register</div>
        </nav>
        <button onclick="handleLogout()" class="text-rose-400 font-bold text-left text-xl hover:opacity-70 transition">Sign out</button>
    </div>

    <!-- 主内容区 Main Content -->
    <div class="main-content">
        
        <!-- Dashboard Page -->
        <div id="dashboard" class="page active space-y-10">
            <h2 id="monitoring-text" class="text-4xl font-bold">Live Monitoring</h2>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- 系统安全状态 -->
                <div class="glass flex flex-col items-center justify-center text-center">
                    <div id="armed-status" class="text-6xl font-black italic mb-8 tracking-tighter text-green-400">ARMED</div>
                    <!-- 关键修改：添加了 ID 以便控制禁用状态 -->
                    <button id="change-status-btn" onclick="toggleAlarm()" class="bg-transparent border border-white/20 px-10 py-3 rounded-full font-bold uppercase tracking-widest text-sm hover:bg-white/5 transition">CHANGE STATUS</button>
                </div>

                <!-- 门磁状态 -->
                <div class="glass flex flex-col items-center justify-center text-center">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Door Status</p>
                    <div id="door-status-text" class="text-6xl font-black italic mb-2 tracking-tighter uppercase text-blue-400">CLOSED</div>
                    <p id="last-ping-text" class="text-slate-500 text-xs font-mono">Syncing...</p>
                </div>
            </div>

            <!-- 定时设置卡片 -->
            <div class="glass space-y-8">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">⏰ Auto-Schedule Alarm</h3>
                <div class="flex items-center gap-6 bg-black/20 p-8 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <input type="number" id="sHour" class="w-20 p-3 text-center text-3xl font-bold">
                        <span class="text-slate-400 text-xl">: 00 to</span>
                        <input type="number" id="eHour" class="w-20 p-3 text-center text-3xl font-bold">
                        <span class="text-slate-400 text-xl">: 00</span>
                    </div>
                    <label class="ml-auto flex items-center gap-4 cursor-pointer">
                        <input type="checkbox" id="sEn" class="w-8 h-8 rounded border-white/20 bg-transparent">
                        <span class="text-xl font-bold">ENABLE</span>
                    </label>
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 p-5 rounded-2xl font-bold text-xl hover:bg-blue-700 transition uppercase tracking-widest">Update Settings</button>
            </div>
        </div>

        <!-- Activity Log -->
        <div id="activity" class="page space-y-6">
            <h2 class="text-3xl font-bold mb-8">Activity History</h2>
            <div class="glass"><table class="w-full text-left"><tbody id="log-table-body"></tbody></table></div>
        </div>

        <!-- Notification -->
        <div id="notification" class="page space-y-6">
            <h2 class="text-3xl font-bold mb-8">Telegram Notifications</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass">
                    <input type="text" id="tgName" placeholder="Name" class="w-full p-3 mb-4">
                    <input type="text" id="tgID" placeholder="Chat ID" class="w-full p-3 mb-4">
                    <button onclick="addTelegramUser()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">Add User</button>
                </div>
                <div class="glass"><div id="tg-table-body"></div></div>
            </div>
        </div>

        <!-- User Register -->
        <div id="register" class="page space-y-6">
            <h2 class="text-3xl font-bold">User Registration</h2>
            <div class="glass max-w-xl">
                <input type="email" id="newEmail" placeholder="Email" class="w-full p-4 mb-4">
                <input type="password" id="newPass" placeholder="Password" class="w-full p-4 mb-4">
                <button onclick="createUser()" class="w-full bg-yellow-600 p-4 rounded-xl font-bold">REGISTER</button>
            </div>
        </div>

    </div>

    <script>
        const SB_URL = "https://cpdsktvenfullcsiezbl.supabase.co", SB_KEY = "sb_publishable_XJoko1-ABFMm9quT1eGSCQ_XCecjXE0";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let currentArmed = false;

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active'); el.classList.add('active');
        }

        async function handleLogin() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert(error.message); else checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                if(session.user.email === 'keehang060224@gmail.com') document.getElementById('nav-register').classList.remove('hidden');
                loadData(); setInterval(loadData, 5000);
            }
        }

        async function addTelegramUser() {
            const n = document.getElementById('tgName').value, id = document.getElementById('tgID').value;
            if(!n || !id) return alert("Fill all fields");
            const { error } = await _supabase.from('telegram_users').insert([{ name: n, telegram_id: id }]);
            if (error) alert(error.message); else { document.getElementById('tgName').value=''; document.getElementById('tgID').value=''; loadData(); }
        }

        async function deleteTelegramUser(id) {
            if(confirm("Remove this subscriber?")) { await _supabase.from('telegram_users').delete().eq('id', id); loadData(); }
        }

        async function loadData() {
            const { data: settings } = await _supabase.from('system_settings').select('*').eq('id', 1).single();
            if (settings) {
                const diff = Math.floor((new Date() - new Date(settings.last_ping)) / 1000);
                document.getElementById('last-ping-text').innerText = diff > 15 ? 'Offline (' + diff + 's ago)' : 'Online Now';
                
                // 定时状态判断逻辑
                const scheduleOn = settings.schedule_enabled;
                const changeBtn = document.getElementById('change-status-btn');
                
                if (scheduleOn) {
                    changeBtn.disabled = true;
                    changeBtn.title = "Manual control disabled while schedule is active";
                } else {
                    changeBtn.disabled = false;
                    changeBtn.title = "";
                }

                currentArmed = settings.system_armed;
                const sEl = document.getElementById('armed-status');
                sEl.innerText = currentArmed ? "ARMED" : "DISARMED";
                sEl.className = "text-6xl font-black italic mb-8 tracking-tighter " + (currentArmed ? "text-green-400" : "text-rose-500");

                const dEl = document.getElementById('door-status-text');
                const doorVal = settings.door_status || "UNKNOWN";
                dEl.innerText = doorVal;
                dEl.className = "text-6xl font-black italic mb-2 tracking-tighter uppercase " + (doorVal === "OPEN" ? "text-rose-500 animate-pulse" : "text-blue-400");

                document.getElementById('sHour').value = settings.start_hour;
                document.getElementById('eHour').value = settings.end_hour;
                document.getElementById('sEn').checked = scheduleOn;
            }

            const { data: logs } = await _supabase.from('logs').select('*').order('id', { ascending: false }).limit(10);
            if (logs) {
                let h = ''; logs.forEach(l => { h += `<tr class="border-b border-white/5"><td class="py-4 font-bold text-lg">${l.event}</td><td class="py-4 text-slate-500 font-mono text-sm text-right">${l.timestamp}</td></tr>`; });
                document.getElementById('log-table-body').innerHTML = h;
            }

            const { data: tgUsers } = await _supabase.from('telegram_users').select('*');
            if (tgUsers) {
                let h = ''; tgUsers.forEach(u => { h += `<div class="flex justify-between items-center mb-4 pb-4 border-b border-white/5"><div><div class="font-bold">${u.name}</div><div class="text-xs text-slate-500">${u.telegram_id}</div></div><button onclick="deleteTelegramUser(${u.id})" class="text-rose-400 text-sm font-bold">REMOVE</button></div>`; });
                document.getElementById('tg-table-body').innerHTML = h;
            }
        }

        async function toggleAlarm() { await _supabase.from('system_settings').update({ system_armed: !currentArmed }).eq('id', 1); loadData(); }
        
        async function saveSettings() {
            const updates = { 
                start_hour: parseInt(document.getElementById('sHour').value), 
                end_hour: parseInt(document.getElementById('eHour').value), 
                schedule_enabled: document.getElementById('sEn').checked 
            };
            await _supabase.from('system_settings').update(updates).eq('id', 1); 
            alert("Settings Updated!");
            loadData();
        }

        async function createUser() {
            const e = document.getElementById('newEmail').value, p = document.getElementById('newPass').value;
            const { error } = await _supabase.auth.signUp({ email: e, password: p });
            if (error) alert(error.message); else alert("Registration Email Sent!");
        }

        async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }
        checkSession();
    </script>
</body>
</html>
